<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Neon Music Hub</title>
    <!-- Importando a fonte Outfit para replicar a tipografia limpa da imagem -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Reset e Fonte */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        /* Fundo principal escuro */
        body {
            min-height: 100vh;
            background-color: #060b13; /* Azul extremamente escuro */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* --- O Arco Neon Azul da Imagem --- */
        .neon-arc-bg {
            position: fixed;
            bottom: -35vh;
            left: 50%;
            transform: translateX(-50%);
            width: 120vw;
            height: 60vh;
            border-radius: 50%;
            /* Borda grossa e borrada para o brilho externo */
            border: 15px solid #2d7aff; 
            filter: blur(25px);
            opacity: 0.6;
            z-index: 1;
            pointer-events: none;
        }
        
        .neon-arc-core {
            position: fixed;
            bottom: -35vh;
            left: 50%;
            transform: translateX(-50%);
            width: 120vw;
            height: 60vh;
            border-radius: 50%;
            /* Linha fina e branca/azulada para o núcleo da luz */
            border: 4px solid #cce0ff; 
            filter: blur(2px);
            opacity: 0.8;
            z-index: 2;
            box-shadow: 0 0 50px 10px rgba(45, 122, 255, 0.8), inset 0 0 50px 10px rgba(45, 122, 255, 0.8);
            pointer-events: none;
        }

        /* Badges Flutuantes (como "Daily Design Challenge" na imagem) */
        .floating-badge {
            position: absolute;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .badge-bottom-left { bottom: 30px; left: 40px; }
        .badge-bottom-right { bottom: 30px; right: 40px; }

        /* --- O Card Principal (Glassmorphism Escuro) --- */
        .glass-card {
            width: 100%;
            max-width: 900px;
            padding: 40px;
            background: rgba(16, 25, 43, 0.55); /* Azul translúcido */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            /* Reflexos na borda (mais claro no topo, escuro na base) */
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-right: 1px solid rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            z-index: 10;
            position: relative;
            margin: 80px 20px;
        }

        /* Brilho neon na base interna do card (replicando o reflexo azul) */
        .glass-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #4da6ff, transparent);
            box-shadow: 0 -10px 30px 2px rgba(77, 166, 255, 0.4);
            border-radius: 50%;
        }

        /* Header do Card */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .header-info h1 {
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .header-info p {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* --- O Grid de Botões --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        /* Botões Estilo Componentes da Imagem */
        .platform-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-weight: 400;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* Efeito de Reflexo no Botão */
        .platform-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .platform-btn:hover {
            background: rgba(45, 122, 255, 0.1);
            border-color: rgba(77, 166, 255, 0.3);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(45, 122, 255, 0.1);
        }

        .platform-btn:hover::before {
            opacity: 1;
        }

        .platform-btn img {
            width: 22px;
            height: 22px;
            opacity: 0.8;
            transition: all 0.3s;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .platform-btn:hover img {
            opacity: 1;
            transform: scale(1.1);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .floating-badge { display: none; } /* Oculta badges no mobile para não poluir */
            .glass-card { padding: 30px 20px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .platform-btn { padding: 12px; font-size: 0.85rem; }
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Elementos do Fundo (O Arco de Luz) -->
    <div class="neon-arc-bg"></div>
    <div class="neon-arc-core"></div>

    <!-- Badges estilo Dribbble (Decorativos) -->
    <div class="floating-badge badge-bottom-left">Updated / 2024</div>
    <div class="floating-badge badge-bottom-right">Let's Listen &gt;</div>

    <!-- Container Principal -->
    <div class="glass-card">
        <!-- Cabeçalho -->
        <div class="header">
            <div class="header-info">
                <h1>Artist Music Profile Links</h1>
            </div>
        </div>

        <!-- Grid de Botões -->
        <div class="grid">
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/spotify/white" alt="Spotify">Spotify</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/applemusic/white" alt="Apple Music">Apple Music</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/amazonmusic/white" alt="Amazon Music">Amazon Music</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/tidal/white" alt="Tidal">Tidal</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/audiomack/white" alt="Audiomack">Audiomack</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/youtubemusic/white" alt="YouTube Music">YouTube Music</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/neteasecloudmusic/white" alt="NetEase">NetEase Cloud</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/qobuz/white" alt="Qobuz">Qobuz</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/soundcloud/white" alt="SoundCloud">SoundCloud</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/pandora/white" alt="Pandora">Pandora</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/beatport/white" alt="Beatport">Beatport</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/yandex/white" alt="Yandex Music">Yandex</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/bandcamp/white" alt="Bandcamp">Bandcamp</a>
            
            <!-- Usando ícones genéricos para as plataformas sem SVG oficial na CDN -->
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/musicbrainz/white" alt="Flo">Flo</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/tencentqq/white" alt="Joox">Joox</a>
            <a href="#" class="platform-btn"><img src="https://cdn.simpleicons.org/wechat/white" alt="Boomplay">Boomplay</a>
        </div>
    </div>

</body>
</html>
